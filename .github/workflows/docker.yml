name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Backend
    - name: Build Backend Image
      run: docker build -t tejaraja/backend:latest ./backend

    - name: Push Backend Image
      run: docker push tejaraja/backend:latest

    # Frontend
    - name: Build Frontend Image
      run: docker build -t tejaraja/frontend:latest ./frontend

    - name: Push Frontend Image
      run: docker push tejaraja/frontend:latest

    # Nginx (optional)
    - name: Debugging - List Files
      run: pwd
           ls -R
    - name: Build Nginx Image
      run: docker build -t tejaraja/nginx:latest ./nginx

    - name: Push Nginx Image
      run: docker push tejaraja/nginx:latest

   
